[metadata]
name = "branches"
description = "Browse and switch Git worktrees"
requirements = ["git", "wt"]

[source]
command = "$HOME/.local/bin/git-branch-switcher list"
no_sort = true
frecency = false
shell = "bash"
display = "{split:@@@:1}"
output = "{}"

[preview]
command = "$HOME/.local/bin/git-branch-switcher preview '{}'"
shell = "bash"

[ui]
orientation = "portrait"

[ui.preview_panel]
size = 60
header = "branch"
scrollbar = true

[ui.status_bar]
hidden = true

[keybindings]
ctrl-r = "reload_source"
ctrl-o = "actions:open"
ctrl-x = ["actions:remove", "reload_source"]

[actions.open]
description = "Open selected PR or branch in the browser"
command = "$HOME/.local/bin/git-branch-switcher open '{}'"
shell = "bash"
mode = "fork"

[actions.remove]
description = "Remove selected worktree"
command = "$HOME/.local/bin/git-branch-switcher remove '{}'"
shell = "bash"
mode = "fork"
